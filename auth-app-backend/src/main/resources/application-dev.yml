# development version of configuration
server:
  port: 8070

#  servlet:
#    context-path: /auth-app-backend

# database connections
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_app
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

# jpa and hibernate configurations
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true



